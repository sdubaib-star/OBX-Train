<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBX — Train Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#08111c; color:#dde6f0; font-family:'Cairo',sans-serif; min-height:100vh; padding-bottom:80px; }

.topbar { background:#0c1a2b; border-bottom:2px solid #f0a500; padding:12px 20px; display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; }
.topbar.r4-mode { border-bottom-color:#e03030; }
.logo { font-family:'Rajdhani',sans-serif; font-size:22px; font-weight:700; color:#f0a500; letter-spacing:3px; cursor:pointer; user-select:none; }
.logo.r4-mode { color:#e03030; }
.logo span { color:#8ab0d0; font-size:12px; font-weight:600; letter-spacing:1px; display:block; margin-top:-2px; }
.top-controls { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }

.tz-select-wrap { display:flex; align-items:center; border:1px solid #1a3050; background:#0c1a2b; overflow:hidden; }
.tz-icon { padding:0 8px; font-size:13px; color:#4a6a8a; border-right:1px solid #1a3050; line-height:32px; }
.tz-select-wrap select { background:transparent; border:none; color:#f0a500; font-family:'Cairo',sans-serif; font-size:11px; font-weight:700; padding:6px 10px 6px 6px; outline:none; cursor:pointer; max-width:160px; }
.tz-select-wrap select option { background:#0c1a2b; color:#dde6f0; }

.pill-bar { display:flex; border:1px solid #1a3050; overflow:hidden; }
.pill-btn { padding:6px 11px; background:transparent; border:none; border-right:1px solid #1a3050; color:#4a6a8a; font-family:'Cairo',sans-serif; font-size:11px; font-weight:700; letter-spacing:1px; cursor:pointer; transition:all 0.15s; white-space:nowrap; }
.pill-btn:last-child { border-right:none; }
.pill-btn.active { background:#f0a500; color:#08111c; }
.r4-mode .pill-btn.active { background:#e03030; color:#fff; }
.pill-btn:hover:not(.active) { color:#f0a500; }

.btn-r4-toggle { font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; padding:6px 14px; border:1px solid #1a3050; background:transparent; color:#4a6a8a; font-family:'Cairo',sans-serif; cursor:pointer; transition:all 0.2s; white-space:nowrap; }
.btn-r4-toggle:hover { border-color:#e03030; color:#e03030; }
.btn-r4-toggle.active { background:#e03030; color:#fff; border-color:#e03030; }

/* MODE TABS (R4) */
.mode-tab-bar { background:#0a1626; border-bottom:1px solid #1a3050; display:none; }
.mode-tab-bar.visible { display:flex; }
.mode-tab-btn { padding:13px 20px; background:transparent; border:none; border-bottom:2px solid transparent; color:#4a6a8a; font-family:'Cairo',sans-serif; font-size:12px; font-weight:700; letter-spacing:1px; text-transform:uppercase; cursor:pointer; transition:all 0.15s; white-space:nowrap; }
.mode-tab-btn.active { color:#e03030; border-bottom-color:#e03030; }
.mode-tab-btn:hover:not(.active) { color:#dde6f0; }
.mode-panel { display:none; }
.mode-panel.active { display:block; }

/* DAY NAV */
.day-nav { background:#0a1626; border-bottom:1px solid #1a3050; display:flex; overflow-x:auto; scrollbar-width:none; }
.day-nav::-webkit-scrollbar { display:none; }
.day-nav-btn { flex:0 0 auto; padding:10px 16px; background:transparent; border:none; border-bottom:2px solid transparent; cursor:pointer; font-family:'Cairo',sans-serif; transition:all 0.15s; text-align:center; min-width:72px; }
.day-nav-btn .dn-day  { font-size:10px; font-weight:700; color:#4a6a8a; letter-spacing:1px; text-transform:uppercase; }
.day-nav-btn .dn-date { font-family:'Rajdhani',sans-serif; font-size:16px; font-weight:700; color:#4a6a8a; line-height:1.2; }
.day-nav-btn.active { border-bottom-color:#f0a500; }
.day-nav-btn.active .dn-day, .day-nav-btn.active .dn-date { color:#f0a500; }
.day-nav-btn.today-btn .dn-day, .day-nav-btn.today-btn .dn-date { color:#2ecc71; }
.day-nav-btn.today-btn.active { border-bottom-color:#2ecc71; }
.day-nav-btn:hover:not(.active) .dn-date { color:#dde6f0; }
.r4-day-nav .day-nav-btn.active { border-bottom-color:#e03030; }
.r4-day-nav .day-nav-btn.active .dn-day,
.r4-day-nav .day-nav-btn.active .dn-date { color:#e03030; }

/* PIN MODAL */
.pin-overlay { position:fixed; inset:0; background:rgba(4,10,20,0.92); z-index:200; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.2s; }
.pin-overlay.show { opacity:1; pointer-events:all; }
.pin-box { background:#0c1a2b; border:1px solid #1a3050; border-top:3px solid #e03030; padding:36px 32px; width:100%; max-width:320px; text-align:center; }
.pin-box h2 { font-family:'Rajdhani',sans-serif; font-size:18px; font-weight:700; letter-spacing:3px; color:#e03030; text-transform:uppercase; margin-bottom:6px; }
.pin-box p  { font-size:12px; color:#4a6a8a; margin-bottom:22px; }
#pinInput { width:100%; background:#08111c; border:1px solid #1a3050; color:#dde6f0; padding:14px; font-family:'Cairo',sans-serif; font-size:24px; font-weight:700; text-align:center; letter-spacing:10px; outline:none; margin-bottom:14px; transition:border-color 0.2s; }
#pinInput:focus { border-color:#e03030; }
.btn-pin-enter { width:100%; background:#e03030; color:#fff; border:none; padding:12px; font-family:'Cairo',sans-serif; font-size:14px; font-weight:900; letter-spacing:2px; text-transform:uppercase; cursor:pointer; transition:background 0.2s; }
.btn-pin-enter:hover { background:#ff4444; }
.pin-error { font-size:12px; color:#e03030; margin-top:10px; min-height:18px; }
.pin-cancel { font-size:11px; color:#4a6a8a; margin-top:14px; cursor:pointer; font-weight:700; letter-spacing:1px; text-transform:uppercase; display:block; }
.pin-cancel:hover { color:#dde6f0; }

.wrap { max-width:560px; margin:0 auto; padding:20px 16px 0; }

/* DATE BAR */
.datebar { text-align:center; margin-bottom:20px; }
.datebar .day  { font-family:'Rajdhani',sans-serif; font-size:12px; letter-spacing:4px; color:#4a6a8a; text-transform:uppercase; margin-bottom:2px; }
.datebar .date { font-family:'Rajdhani',sans-serif; font-size:26px; font-weight:700; color:#dde6f0; }
.datebar .tz   { font-size:10px; color:#2a4060; font-weight:700; letter-spacing:2px; margin-top:3px; }
.datebar.future-date .date { color:#8ab0d0; }

/* SCHEDULE */
.schedule { border:1px solid #1a3050; margin-bottom:20px; overflow:hidden; }
.slot { display:grid; grid-template-columns:86px 1fr 100px; align-items:center; border-bottom:1px solid #1a3050; transition:background 0.15s; animation:fadeUp 0.25s ease both; }
.slot:last-child { border-bottom:none; }
@keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.slot.blocked { background:rgba(224,48,48,0.05); }
.slot.special { background:rgba(255,215,0,0.05); }
.slot.taken   { background:#0b1824; }
.slot.yours   { background:rgba(240,165,0,0.05); }
.slot.open    { background:#08111c; }
.slot.past    { background:#090f18; opacity:0.42; pointer-events:none; }
.slot-time { padding:14px 10px; border-right:1px solid #1a3050; text-align:center; }
.t-main { font-family:'Rajdhani',sans-serif; font-size:19px; font-weight:700; color:#f0a500; line-height:1; }
.t-ampm { font-size:9px; font-weight:700; color:#4a6a8a; letter-spacing:1px; text-transform:uppercase; margin-top:1px; }
.t-ksa  { font-size:9px; color:#2a4060; font-weight:600; margin-top:3px; }
.slot.blocked .t-main { color:#e03030; }
.slot.special .t-main { color:#ffd700; }
.slot.open    .t-main { color:#2ecc71; }
.slot-mid { padding:12px 14px; }
.cname { font-size:14px; font-weight:700; color:#dde6f0; line-height:1.3; }
.cname.empty { color:#2a4060; font-style:italic; font-size:13px; font-weight:600; }
.cname.yours { color:#f0a500; }
.cname.special-name { color:#ffd700; }
.csub { font-size:10px; font-weight:700; color:#2a4060; letter-spacing:1px; text-transform:uppercase; margin-top:3px; }
.slot.open .csub    { color:#2ecc71; }
.slot.special .csub { color:#ffd700; }
.slot-right { padding:12px 10px; text-align:center; }
.badge { display:inline-block; font-size:9px; font-weight:700; letter-spacing:1px; text-transform:uppercase; padding:4px 8px; white-space:nowrap; }
.b-open    { background:rgba(46,204,113,0.1);  border:1px solid #2ecc71; color:#2ecc71; }
.b-taken   { background:rgba(30,48,80,0.5);    border:1px solid #2a4060; color:#4a6a8a; }
.b-blocked { background:rgba(224,48,48,0.1);   border:1px solid #e03030; color:#e03030; }
.b-yours   { background:rgba(240,165,0,0.12);  border:1px solid #f0a500; color:#f0a500; }
.b-special { background:rgba(255,215,0,0.12);  border:1px solid #ffd700; color:#ffd700; font-size:8px; }
.b-past    { background:rgba(30,48,80,0.3);    border:1px solid #1a3050; color:#2a4060; }

/* MEMBER FORM */
.form-card { background:#0c1a2b; border:1px solid #1a3050; border-top:2px solid #f0a500; padding:20px 18px; margin-bottom:10px; }
.form-card h3 { font-family:'Rajdhani',sans-serif; font-size:15px; font-weight:700; letter-spacing:2px; color:#f0a500; text-transform:uppercase; margin-bottom:14px; }
.field { margin-bottom:12px; }
.field label { display:block; font-size:10px; font-weight:700; color:#4a6a8a; letter-spacing:2px; text-transform:uppercase; margin-bottom:6px; }
.field input, .field select { width:100%; background:#08111c; border:1px solid #1a3050; color:#dde6f0; padding:10px 14px; font-family:'Cairo',sans-serif; font-size:14px; font-weight:700; outline:none; transition:border-color 0.2s; -webkit-appearance:none; }
.field input:focus, .field select:focus { border-color:#f0a500; }
.field select option { background:#0c1a2b; }
.btn-signup { width:100%; background:#f0a500; color:#08111c; border:none; padding:13px; font-family:'Cairo',sans-serif; font-size:15px; font-weight:900; letter-spacing:2px; text-transform:uppercase; cursor:pointer; transition:background 0.2s; margin-top:4px; }
.btn-signup:hover { background:#ffc234; }
.special-notice { background:rgba(255,215,0,0.06); border:1px solid rgba(255,215,0,0.25); border-left:3px solid #ffd700; padding:10px 14px; font-size:12px; color:#ffd700; font-weight:600; margin-bottom:16px; line-height:1.6; }

/* R4 SLOT CARDS */
.slots { display:flex; flex-direction:column; gap:10px; margin-bottom:28px; }
.slot-card { background:#0e1e30; border:1px solid #1a3050; border-left:3px solid #1a3050; animation:fadeUp 0.25s ease both; overflow:hidden; }
.slot-card.blocked { border-left-color:#e03030; background:rgba(224,48,48,0.04); }
.slot-card.filled  { border-left-color:#f0a500; }
.slot-card.special { border-left-color:#ffd700; background:rgba(255,215,0,0.04); }
.card-top { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; gap:12px; flex-wrap:wrap; }
.card-left { display:flex; align-items:center; gap:14px; }
.card-time { min-width:80px; }
.ct-local { font-family:'Rajdhani',sans-serif; font-size:22px; font-weight:700; color:#f0a500; line-height:1; }
.ct-ampm  { font-size:10px; color:#4a6a8a; letter-spacing:1px; font-weight:700; }
.ct-ksa   { font-size:9px; color:#2a4060; font-weight:600; margin-top:2px; }
.slot-card.special .ct-local { color:#ffd700; }
.slot-card.blocked .ct-local { color:#e03030; }
.card-conductor { font-size:14px; font-weight:700; color:#dde6f0; }
.card-conductor.empty { color:#2a4060; font-style:italic; font-size:13px; font-weight:600; }
.card-conductor.special-name { color:#ffd700; }
.card-status { font-size:10px; font-weight:700; color:#4a6a8a; letter-spacing:1px; text-transform:uppercase; margin-top:2px; }
.card-actions { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
.btn { font-family:'Cairo',sans-serif; font-weight:700; font-size:11px; letter-spacing:1px; text-transform:uppercase; padding:7px 14px; border:1px solid; cursor:pointer; transition:all 0.15s; white-space:nowrap; }
.btn-block   { background:transparent; border-color:#e03030; color:#e03030; }
.btn-block:hover   { background:#e03030; color:#fff; }
.btn-unblock { background:transparent; border-color:#2ecc71; color:#2ecc71; }
.btn-unblock:hover { background:#2ecc71; color:#08111c; }
.btn-remove  { background:transparent; border-color:#4a6a8a; color:#4a6a8a; }
.btn-remove:hover  { border-color:#dde6f0; color:#dde6f0; }
.special-label { font-size:11px; font-weight:700; color:#ffd700; letter-spacing:1px; }
.card-bottom { border-top:1px solid #1a3050; padding:10px 16px; background:#0c1a2b; display:flex; gap:8px; align-items:center; }
.card-bottom input { flex:1; background:#08111c; border:1px solid #1a3050; color:#dde6f0; padding:7px 12px; font-family:'Cairo',sans-serif; font-size:13px; font-weight:700; outline:none; transition:border-color 0.2s; }
.card-bottom input:focus { border-color:#f0a500; }
.card-bottom input::placeholder { color:#2a4060; font-style:italic; font-weight:600; }
.btn-assign { background:#f0a500; color:#08111c; border:1px solid #f0a500; padding:7px 16px; font-family:'Cairo',sans-serif; font-size:11px; font-weight:900; letter-spacing:1px; text-transform:uppercase; cursor:pointer; transition:background 0.15s; white-space:nowrap; }
.btn-assign:hover { background:#ffc234; }
.winner-assign { border-top:1px solid rgba(255,215,0,0.2); padding:10px 16px; background:rgba(255,215,0,0.04); display:flex; gap:8px; align-items:center; }
.winner-assign input { flex:1; background:#08111c; border:1px solid rgba(255,215,0,0.3); color:#ffd700; padding:7px 12px; font-family:'Cairo',sans-serif; font-size:13px; font-weight:700; outline:none; }
.winner-assign input:focus { border-color:#ffd700; }
.winner-assign input::placeholder { color:#5a4a00; font-style:italic; font-weight:600; }
.btn-set-winner { background:#ffd700; color:#08111c; border:1px solid #ffd700; padding:7px 16px; font-family:'Cairo',sans-serif; font-size:11px; font-weight:900; letter-spacing:1px; text-transform:uppercase; cursor:pointer; }
.btn-set-winner:hover { background:#ffe84d; }
.reset-box { border:1px solid rgba(224,48,48,0.2); padding:16px 18px; background:rgba(224,48,48,0.03); margin-bottom:30px; display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
.reset-box p { font-size:12px; color:#4a6a8a; font-weight:600; line-height:1.6; }
.btn-reset { background:transparent; border:1px solid #e03030; color:#e03030; padding:8px 20px; font-family:'Cairo',sans-serif; font-size:12px; font-weight:700; letter-spacing:1px; text-transform:uppercase; cursor:pointer; transition:all 0.15s; white-space:nowrap; }
.btn-reset:hover { background:#e03030; color:#fff; }

/* ARCHIVE */
.archive-controls { display:flex; gap:10px; align-items:flex-start; margin-bottom:18px; flex-wrap:wrap; justify-content:space-between; }
.arc-count { font-size:11px; font-weight:700; color:#4a6a8a; letter-spacing:1px; margin-top:4px; }
.archive-btns { display:flex; gap:8px; }
.btn-clear-archive { background:transparent; border:1px solid #4a2a2a; color:#e07070; padding:6px 14px; font-family:'Cairo',sans-serif; font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; cursor:pointer; transition:all 0.15s; }
.btn-clear-archive:hover { border-color:#e03030; color:#fff; background:#e03030; }
.btn-export { background:transparent; border:1px solid #1a3050; color:#8ab0d0; padding:6px 14px; font-family:'Cairo',sans-serif; font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; cursor:pointer; transition:all 0.15s; }
.btn-export:hover { border-color:#8ab0d0; color:#fff; }
.archive-empty { text-align:center; padding:60px 20px; color:#2a4060; font-size:14px; font-weight:600; }
.archive-empty .arc-icon { font-size:40px; margin-bottom:12px; }
.arc-day { margin-bottom:16px; border:1px solid #1a3050; overflow:hidden; animation:fadeUp 0.2s ease both; }
.arc-day-header { display:flex; align-items:center; justify-content:space-between; padding:10px 16px; background:#0c1a2b; cursor:pointer; border-bottom:1px solid #1a3050; gap:10px; flex-wrap:wrap; transition:background 0.15s; }
.arc-day-header:hover { background:#0e2035; }
.arc-date-badge { font-family:'Rajdhani',sans-serif; font-size:15px; font-weight:700; color:#f0a500; letter-spacing:1px; }
.arc-day-meta { font-size:11px; color:#4a6a8a; font-weight:600; }
.arc-day-stats { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
.arc-stat { font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase; padding:3px 10px; border:1px solid; }
.arc-stat.filled  { border-color:#f0a500; color:#f0a500; background:rgba(240,165,0,0.06); }
.arc-stat.blocked { border-color:#e03030; color:#e03030; background:rgba(224,48,48,0.06); }
.arc-chevron { font-size:12px; color:#4a6a8a; transition:transform 0.2s; }
.arc-day.open .arc-chevron { transform:rotate(180deg); }
.arc-day-body { display:none; }
.arc-day.open .arc-day-body { display:block; }
.arc-slot-row { display:grid; grid-template-columns:70px 1fr auto; align-items:center; border-bottom:1px solid #0e1e30; padding:10px 16px; gap:12px; }
.arc-slot-row:last-child { border-bottom:none; }
.arc-slot-row.arc-blocked { background:rgba(224,48,48,0.03); }
.arc-slot-row.arc-special { background:rgba(255,215,0,0.03); }
.arc-slot-row.arc-empty   { opacity:0.5; }
.arc-time { font-family:'Rajdhani',sans-serif; font-size:16px; font-weight:700; color:#f0a500; }
.arc-slot-row.arc-blocked .arc-time { color:#e03030; }
.arc-slot-row.arc-special .arc-time { color:#ffd700; }
.arc-conductor { font-size:13px; font-weight:700; color:#dde6f0; }
.arc-conductor.none { color:#2a4060; font-style:italic; font-size:12px; font-weight:600; }
.arc-badge { display:inline-block; font-size:9px; font-weight:700; letter-spacing:1px; text-transform:uppercase; padding:3px 8px; white-space:nowrap; }
.arc-b-done    { background:rgba(46,204,113,0.1);  border:1px solid #2ecc71; color:#2ecc71; }
.arc-b-blocked { background:rgba(224,48,48,0.1);   border:1px solid #e03030; color:#e03030; }
.arc-b-empty   { background:rgba(30,48,80,0.5);    border:1px solid #2a4060; color:#4a6a8a; }
.arc-b-special { background:rgba(255,215,0,0.1);   border:1px solid #ffd700; color:#ffd700; }

.divider { font-size:10px; font-weight:700; color:#2a4060; letter-spacing:3px; text-transform:uppercase; margin-bottom:10px; display:flex; align-items:center; gap:8px; }
.divider::after { content:''; flex:1; height:1px; background:#1a3050; }

#toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); font-weight:900; font-size:13px; padding:12px 28px; letter-spacing:1px; opacity:0; pointer-events:none; transition:opacity 0.3s; text-align:center; min-width:220px; z-index:300; }
#toast.show { opacity:1; }

body.rtl { direction:rtl; }
body.rtl .topbar { flex-direction:row-reverse; }
body.rtl .special-notice { border-left:none; border-right:3px solid #ffd700; }
body.rtl .divider::after { display:none; }
body.rtl .divider::before { content:''; flex:1; height:1px; background:#1a3050; order:-1; }
body.rtl .tz-icon { border-right:none; border-left:1px solid #1a3050; }
body.rtl .slot-card { border-left:1px solid #1a3050; border-right:3px solid #1a3050; }
body.rtl .slot-card.blocked { border-right-color:#e03030; }
body.rtl .slot-card.filled  { border-right-color:#f0a500; }
body.rtl .slot-card.special { border-right-color:#ffd700; }
</style>
</head>
<body>

<div class="pin-overlay" id="pinOverlay">
  <div class="pin-box">
    <h2 id="pinTitle">R4 Access</h2>
    <p id="pinSub">Enter your R4 PIN to continue</p>
    <input type="password" id="pinInput" maxlength="6" placeholder="••••" onkeydown="if(event.key==='Enter')checkPin()">
    <button class="btn-pin-enter" onclick="checkPin()" id="pinBtn">ENTER</button>
    <div class="pin-error" id="pinError"></div>
    <span class="pin-cancel" onclick="closePinModal()" id="pinCancel">Cancel</span>
  </div>
</div>

<div class="topbar" id="topbar">
  <div class="logo" id="logoEl" onclick="if(isR4)exitR4()">OBX <span id="logoSub">Alliance · Last War</span></div>
  <div class="top-controls">
    <div class="tz-select-wrap">
      <span class="tz-icon">🕐</span>
      <select id="tzPicker" onchange="setTZ(this.value)">
        <optgroup label="Middle East">
          <option value="3" selected>KSA / Kuwait (UTC+3)</option>
          <option value="4">UAE / Oman (UTC+4)</option>
          <option value="3.5">Iran (UTC+3:30)</option>
        </optgroup>
        <optgroup label="Europe">

function getKSANow() {
  const now=new Date(), utc=now.getTime()+now.getTimezoneOffset()*60000;
  return new Date(utc+3*3600000);
}
function getLocalNow() {
  const now=new Date(), utc=now.getTime()+now.getTimezoneOffset()*60000;
  return new Date(utc+tzOffset*3600000);
}
function ksaDateOffset(n) {
  const d=getKSANow(); d.setDate(d.getDate()+n); return d;
}
function dateToKey(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function storageKey(dateKey) {
  return dateKey===dateToKey(getKSANow()) ? 'obx_trains_v3' : 'obx_week_'+dateKey;
}
function ksaToLocal(h) { return (((h-3+tzOffset)%24)+24)%24; }
function formatHour(h) {
  const w=Math.floor(h), m=Math.round((h-w)*60), hh=w%12===0?12:w%12;
  return { time:String(hh).padStart(2,'0')+':'+String(m).padStart(2,'0'), ampm:w<12?'AM':'PM' };
}
function isSlotPast(ksaHour, dayOff) {
  if(dayOff>0)return false;
  const ksa=getKSANow(), nowH=ksa.getHours()+ksa.getMinutes()/60;
  if(ksaHour===1)return nowH>=1&&nowH<5;
  return nowH>=ksaHour;
}
function tzLbl() {
  const sign=tzOffset>=0?'+':'-', abs=Math.abs(tzOffset), w=Math.floor(abs);
  return 'UTC'+sign+(abs%1!==0?w+':30':w);
}
function setTZ(val) {
  tzOffset=parseFloat(val); localStorage.setItem('obx_tz',val);
  renderMember(); if(isR4)renderR4Today();
}

function setLang(l,btn){

  document.querySelectorAll('.pill-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.body.classList.toggle('rtl',l==='ar');
  document.documentElement.lang=l;
  localStorage.setItem('obx_lang',l);
  applyTranslations(); buildDayNavs(); renderMember();
  if(isR4)renderR4Today();
}

function applyTranslations(){
  const ids={pinTitle:'pinTitle',pinSub:'pinSub',pinBtn:'pinBtn',pinCancel:'pinCancel',
    scheduleLabel:'scheduleLabel',formTitle:'formTitle',labelName:'labelName',
    labelSlot:'labelSlot',btnSignup:'btnSignup',
    manageLabel:'manageLabel',resetLabel:'resetLabel',resetDesc:'resetDesc',resetBtn:'resetBtn',
    archiveLabel:'archiveLabel',modeTabManage:'modeTabManage',modeTabArchive:'modeTabArchive'};
  Object.entries(ids).forEach(([id,k])=>{const el=document.getElementById(id);if(el)el.textContent=t(k);});
  document.getElementById('specialNotice').innerHTML=t('specialNotice');
  document.getElementById('memberName').placeholder=t('namePlaceholder');
  document.getElementById('pinError').textContent='';
  document.getElementById('logoSub').textContent=isR4?t('logoR4Sub'):'Alliance · Last War';
  document.getElementById('btnR4Toggle').textContent=isR4?'✕ '+t('r4Label'):t('r4Label')+' ▲';
}

// ── DAY NAVS ─────────────────────────────────────────────────
function dayNavLabel(i){
  const tx=T[lang];
  if(i===0)return tx.today; if(i===1)return tx.tomorrow;
  return tx.days[ksaDateOffset(i).getDay()];
}

function buildDayNavs(){
  ['memberDayNav','r4DayNav'].forEach(navId=>{
    const r4Nav=navId==='r4DayNav';
    const cur=r4Nav?r4Day:memberDay;
    const nav=document.getElementById(navId);
    nav.innerHTML='';
    for(let i=0;i<DAYS_AHEAD;i++){
      const d=ksaDateOffset(i);
      const btn=document.createElement('button');
      btn.className='day-nav-btn'+(i===0?' today-btn':'')+(i===cur?' active':'');
      btn.innerHTML=`<div class="dn-day">${dayNavLabel(i)}</div><div class="dn-date">${d.getDate()} ${T[lang].months[d.getMonth()]}</div>`;
      const idx=i;
      btn.onclick=()=>{
        if(r4Nav){r4Day=idx;buildDayNavs();renderR4Today();}
        else{memberDay=idx;buildDayNavs();renderMember();}
      };
      nav.appendChild(btn);
    }
  });
}

function defaultTrains(){
  return FIXED_SLOTS.map(s=>({id:s.id,conductor:'',blocked:!!s.special,special:!!s.special}));
}
function normalizeTrains(saved){
  return FIXED_SLOTS.map(s=>{
    const f=saved?saved.find(x=>x.id===s.id):null;
    if(s.special)return{id:s.id,conductor:f?f.conductor||'':'',blocked:true,special:true};
    return f?{id:s.id,conductor:f.conductor||'',blocked:!!f.blocked,special:false}
            :{id:s.id,conductor:'',blocked:false,special:false};
  });
}
function loadTrainsForDay(dayOff){
  const dk=dateToKey(ksaDateOffset(dayOff));
  return _cache[dk] ? _cache[dk] : defaultTrains();
}
async function saveTrainsForDay(dayOff,trains){
  const dk=dateToKey(ksaDateOffset(dayOff));
  _cache[dk]=trains;
  if(fbReady){
    await fbSet('schedule/'+dk, trains.map(t=>({...t})));
  } else {
    const lsKey=dk===dateToKey(getKSANow())?'obx_trains_v3':'obx_week_'+dk;
    localStorage.setItem(lsKey, JSON.stringify(trains));
  }
}
function loadArchive(){ return _arc; }
async function archiveToday(){
  const trains=loadTrainsForDay(0), dateKey=dateToKey(getKSANow());
  const snap={date:dateKey,archivedAt:new Date().toISOString(),
    slots:FIXED_SLOTS.map(s=>{const tr=trains.find(x=>x.id===s.id);
      return{id:s.id,ksaLabel:s.ksaLabel,special:s.special,conductor:tr?tr.conductor:'',blocked:tr?tr.blocked:false};})};
  const idx=_arc.findIndex(d=>d.date===dateKey);
  if(idx>=0)_arc.splice(idx,1);
  _arc.unshift(snap);
  if(_arc.length>90)_arc.splice(90);
  if(fbReady){
    await fbSet('archive', _arc);
  } else {
    localStorage.setItem(ARCHIVE_KEY, JSON.stringify(_arc));
  }
}
async function clearArchiveData(){
  _arc=[];
  if(fbReady){ await fbRemove('archive'); }
  else { localStorage.removeItem(ARCHIVE_KEY); }
}

// Subscribe to real-time updates from Firebase for all 7 days + archive
function subscribeFirebase(){
  if(!fbReady) return;
  // Listen to entire schedule node
  fbListen('schedule', val => {
    if(!val){ return; }
    Object.keys(val).forEach(dk => {
      _cache[dk] = normalizeTrains(val[dk]);
    });
    renderMember();
    if(isR4) renderR4Today();
  });
  // Listen to archive
  fbListen('archive', val => {
    _arc = val || [];
    if(isR4 && document.getElementById('panelArchive').classList.contains('active')) renderArchive();
  });
}

// Load initial data (called on page load)
function initData(){
  if(fbReady){
    showConnecting(true);
    let firstLoad=true;
    fbRef('schedule').on('value', snap=>{
      const val=snap.exists()?snap.val():{};
      for(let i=0;i<DAYS_AHEAD;i++){
        const dk=dateToKey(ksaDateOffset(i));
        _cache[dk]=normalizeTrains(val[dk]||null);
      }
      if(firstLoad){firstLoad=false;showConnecting(false);}
      renderMember();
      if(isR4)renderR4Today();
    }, err=>{
      console.warn('Firebase error:',err);
      showConnecting(false);
      renderMember();
    });
    fbRef('archive').on('value', snap=>{
      _arc=snap.exists()?snap.val():[];
      if(!Array.isArray(_arc))_arc=Object.values(_arc);
      if(isR4&&document.getElementById('panelArchive').classList.contains('active'))renderArchive();
    });
    // Safety: hide overlay after 5s no matter what
    setTimeout(()=>{showConnecting(false);renderMember();},5000);
  } else {
    // Fallback: localStorage
    for(let i=0;i<DAYS_AHEAD;i++){
      const dk=dateToKey(ksaDateOffset(i));
      const lsKey=dk===dateToKey(getKSANow())?'obx_trains_v3':'obx_week_'+dk;
      try{const r=localStorage.getItem(lsKey);_cache[dk]=normalizeTrains(r?JSON.parse(r):null);}
      catch(e){_cache[dk]=defaultTrains();}
    }
    try{const r=localStorage.getItem(ARCHIVE_KEY);_arc=r?JSON.parse(r):[];}catch(e){_arc=[];}
  }
}

function switchModeTab(tab,btn){
  document.querySelectorAll('.mode-tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.mode-panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');

}

// ── RENDER MEMBER ─────────────────────────────────────────────
function renderMember(){
  const trains=loadTrainsForDay(memberDay);
  const myName=(localStorage.getItem('obx_myname')||'').toLowerCase();
  const tx=T[lang];
  const ksaDay=ksaDateOffset(memberDay);
  const localNow=getLocalNow();
  const dispDate=memberDay===0?localNow:ksaDay;

  document.getElementById('dayLabel').textContent=tx.daysFull[dispDate.getDay()];
  document.getElementById('dateLabel').textContent=dispDate.getDate()+' '+tx.months[dispDate.getMonth()]+' '+dispDate.getFullYear();
  document.getElementById('tzLabel').textContent=tx.tzPrefix+' · '+tzLbl();
  document.getElementById('datebar').className='datebar'+(memberDay>0?' future-date':'');

  const list=document.getElementById('scheduleList');
  list.innerHTML='';
  trains.forEach((train,i)=>{
    const slot=FIXED_SLOTS.find(s=>s.id===train.id);
    const isSpecial=train.special, isBlocked=train.blocked&&!isSpecial;
    const isPast=!isSpecial&&!isBlocked&&isSlotPast(slot.ksaHour,memberDay);
    const isTaken=!!train.conductor&&!isSpecial&&!isBlocked;
    const isYours=myName&&train.conductor&&train.conductor.toLowerCase()===myName;
    const isOpen=!isSpecial&&!isBlocked&&!isPast&&!train.conductor;
    const {time:lt,ampm}=formatHour(ksaToLocal(slot.ksaHour));
    const ksaRef=tzOffset!==3?`<div class="t-ksa">${slot.ksaLabel} ${tx.ksaNote}</div>`:'';

    let cls='slot ';
    if(isSpecial)cls+='special';
    else if(isBlocked)cls+='blocked';
    else if(isPast)cls+='past';
    else if(isYours)cls+='yours';
    else if(isTaken)cls+='taken';
    else cls+='open';

    let badge='';
    if(isSpecial)badge=`<span class="badge b-special">${tx.specialBadge}</span>`;
    else if(isBlocked)badge=`<span class="badge b-blocked">⛔</span>`;
    else if(isPast)badge=`<span class="badge b-past">${tx.pastBadge}</span>`;
    else if(isYours)badge=`<span class="badge b-yours">${tx.yoursBadge}</span>`;
    else if(isTaken)badge=`<span class="badge b-taken">${tx.takenBadge}</span>`;
    else badge=`<span class="badge b-open">${tx.openBadge}</span>`;

    const cnameHtml=isSpecial
      ?`<div class="cname special-name">🏆 ${train.conductor||tx.specialConductor}</div>`
      :isTaken?`<div class="cname${isYours?' yours':''}">👤 ${train.conductor}</div>`
      :isBlocked?`<div class="cname empty">— —</div>`
      :`<div class="cname empty">${tx.noConductor}</div>`;

    const csubHtml=isSpecial?`<div class="csub">${tx.specialSub}</div>`
      :isPast?`<div class="csub">${tx.pastBadge}</div>`
      :isOpen?`<div class="csub">${tx.available}</div>`
      :isTaken?`<div class="csub">${tx.conducting}</div>`:'';

    list.insertAdjacentHTML('beforeend',`
      <div class="${cls}" style="animation-delay:${i*0.07}s">
        <div class="slot-time"><div class="t-main">${lt}</div><div class="t-ampm">${ampm}</div>${ksaRef}</div>
        <div class="slot-mid">${cnameHtml}${csubHtml}</div>
        <div class="slot-right">${badge}</div>
      </div>`);
  });

  const sel=document.getElementById('slotSelect');
  sel.innerHTML='';
  trains.forEach(train=>{
    if(!train.blocked&&!train.special&&!train.conductor){
      const slot=FIXED_SLOTS.find(s=>s.id===train.id);
      if(isSlotPast(slot.ksaHour,memberDay))return;
      const{time,ampm}=formatHour(ksaToLocal(slot.ksaHour));
      const opt=document.createElement('option');
      opt.value=train.id;
      opt.textContent=time+' '+ampm+(tzOffset!==3?' ('+slot.ksaLabel+' KSA)':'');
      sel.appendChild(opt);
    }
  });
  if(!sel.options.length){
    const opt=document.createElement('option');
    opt.textContent=tx.noSlots; opt.disabled=true; sel.appendChild(opt);
  }
}

async function signup(){
  const name=document.getElementById('memberName').value.trim();
  const slotId=parseInt(document.getElementById('slotSelect').value);
  if(!name){toast(t('toastName'),true);return;}
  if(!slotId){toast(t('toastNoSlot'),true);return;}
  const trains=loadTrainsForDay(memberDay);
  const train=trains.find(x=>x.id===slotId);
  if(!train)return;
  if(train.special||train.blocked){toast(t('toastBlocked'),true);return;}
  if(train.conductor){toast(t('toastTaken'),true);return;}
  const slotDef=FIXED_SLOTS.find(s=>s.id===slotId);
  if(slotDef&&isSlotPast(slotDef.ksaHour,memberDay)){toast(t('toastPast'),true);return;}
  const already=trains.find(x=>x.conductor&&x.conductor.toLowerCase()===name.toLowerCase());
  if(already){toast(t('toastAlready',{date:dayNavLabel(memberDay)}),true);return;}
  train.conductor=name;
  await saveTrainsForDay(memberDay,trains);
  localStorage.setItem('obx_myname',name);
  const{time,ampm}=formatHour(ksaToLocal(slotDef.ksaHour));
  toast(t('toastSuccess',{slot:time+' '+ampm,date:dayNavLabel(memberDay)}));
  renderMember();
}

// ── RENDER R4 ─────────────────────────────────────────────────
function renderR4Today(){
  const trains=loadTrainsForDay(r4Day);
  const list=document.getElementById('slotsList');
  const tx=T[lang];
  const ksaDay=ksaDateOffset(r4Day);
  list.innerHTML='';

  document.getElementById('r4DayLabel').textContent=r4Day===0?tx.today:r4Day===1?tx.tomorrow:tx.daysFull[ksaDay.getDay()];
  document.getElementById('r4DateLabel').textContent=ksaDay.getDate()+' '+tx.months[ksaDay.getMonth()]+' '+ksaDay.getFullYear();

  trains.forEach((train,i)=>{
    const slot=FIXED_SLOTS.find(s=>s.id===train.id);
    const isSpecial=train.special, isBlocked=train.blocked&&!isSpecial;
    const isFilled=!!train.conductor&&!isSpecial&&!isBlocked;
    const{time:lt,ampm}=formatHour(ksaToLocal(slot.ksaHour));
    const ksaRef=tzOffset!==3?`<div class="ct-ksa">${slot.ksaLabel} KSA</div>`:'';

    let cls='slot-card';
    if(isSpecial)cls+=' special';
    else if(isBlocked)cls+=' blocked';
    else if(isFilled)cls+=' filled';

    const conductorHtml=isSpecial
      ?(train.conductor?`<div class="card-conductor special-name">🏆 ${train.conductor}</div>`:`<div class="card-conductor empty">${t('noConductorR4')}</div>`)
      :isFilled?`<div class="card-conductor">👤 ${train.conductor}</div>`
      :`<div class="card-conductor empty">${t('noConductorR4')}</div>`;

    const statusHtml=isSpecial?`<div class="card-status" style="color:#ffd700">${t('statusWinner')}</div>`
      :isBlocked?`<div class="card-status" style="color:#e03030">${t('statusBlocked')}</div>`
      :isFilled?`<div class="card-status" style="color:#f0a500">${t('statusAssigned')}</div>`
      :`<div class="card-status">${t('statusOpen')}</div>`;

    const actionsHtml=isSpecial?`<span class="special-label">${t('specialLabel')}</span>`
      :(isBlocked
        ?`<button class="btn btn-unblock" onclick="r4ToggleBlock(${train.id})">${t('btnUnblock')}</button>`
        :`<button class="btn btn-block" onclick="r4ToggleBlock(${train.id})">${t('btnBlock')}</button>`)
      +(isFilled?`<button class="btn btn-remove" onclick="r4RemoveConductor(${train.id})">${t('btnRemove')}</button>`:'');

    const bottomHtml=isSpecial
      ?`<div class="winner-assign">
          <input type="text" id="win-${train.id}" placeholder="${t('winnerPlaceholder')}" maxlength="30">
          <button class="btn-set-winner" onclick="r4SetWinner(${train.id})">${t('btnSetWinner')}</button>
        </div>`
      :`<div class="card-bottom">
          <input type="text" id="assign-${train.id}" placeholder="${t('assignPlaceholder')}" maxlength="30">
          <button class="btn-assign" onclick="r4Assign(${train.id})">${t('btnAssign')}</button>
        </div>`;

    list.insertAdjacentHTML('beforeend',`
      <div class="${cls}" style="animation-delay:${i*0.07}s">
        <div class="card-top">
          <div class="card-left">
            <div class="card-time"><div class="ct-local">${lt}</div><div class="ct-ampm">${ampm}</div>${ksaRef}</div>
            <div>${conductorHtml}${statusHtml}</div>
          </div>
          <div class="card-actions">${actionsHtml}</div>
        </div>
        ${bottomHtml}
      </div>`);
  });
}

async function r4Save(trains){
  await saveTrainsForDay(r4Day,trains);
  toast(t('toastSaved')); renderR4Today(); renderMember();
}
function r4ToggleBlock(id){
  const trains=loadTrainsForDay(r4Day),tr=trains.find(x=>x.id===id);
  if(tr&&!tr.special){tr.blocked=!tr.blocked;if(tr.blocked)tr.conductor='';r4Save(trains);}
}
function r4RemoveConductor(id){
  const trains=loadTrainsForDay(r4Day),tr=trains.find(x=>x.id===id);
  if(tr&&!tr.special){tr.conductor='';r4Save(trains);}
}
function r4Assign(id){
  const name=document.getElementById('assign-'+id).value.trim();
  if(!name){toast(t('toastEnterName'),true);return;}
  const trains=loadTrainsForDay(r4Day),tr=trains.find(x=>x.id===id);
  if(!tr||tr.special||tr.blocked)return;
  tr.conductor=name; r4Save(trains);
  document.getElementById('assign-'+id).value='';
}
function r4SetWinner(id){
  const name=document.getElementById('win-'+id).value.trim();
  if(!name){toast(t('toastEnterName'),true);return;}
  const trains=loadTrainsForDay(r4Day),tr=trains.find(x=>x.id===id);
  if(tr){tr.conductor=name;r4Save(trains);document.getElementById('win-'+id).value='';}
}
async function resetAll(){
  if(!confirm(t('arcResetConfirm')))return;
  await archiveToday();
  await saveTrainsForDay(0,FIXED_SLOTS.map(s=>({id:s.id,conductor:'',blocked:!!s.special,special:!!s.special})));
  toast(t('toastArchived')); renderR4Today(); renderMember();
}

// ── ARCHIVE RENDER ────────────────────────────────────────────
function renderArchive(){
  const arc=loadArchive();
  document.getElementById('arcCount').textContent=arc.length?arc.length+' '+t('arcDays'):'';
  const list=document.getElementById('archiveList');
  list.innerHTML='';
  if(!arc.length){list.innerHTML=`<div class="archive-empty"><div class="arc-icon">🗄</div>${t('arcEmpty').replace('\n','<br>')}</div>`;return;}
  arc.forEach((day,di)=>{
    const filled=day.slots.filter(s=>s.conductor&&!s.blocked&&!s.special).length;
    const blocked=day.slots.filter(s=>s.blocked&&!s.special).length;
    const winner=day.slots.find(s=>s.special&&s.conductor);
    const[y,m,d]=day.date.split('-');
    const mons=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const dateStr=d+' '+mons[parseInt(m)-1]+' '+y;
    const arcTime=day.archivedAt?new Date(day.archivedAt).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'';
    const statsHtml=[
      filled>0?`<span class="arc-stat filled">${filled} ${t('arcBadgeDone').toLowerCase()}</span>`:'',
      blocked>0?`<span class="arc-stat blocked">${blocked} ${t('arcBadgeBlocked').toLowerCase()}</span>`:'',
      winner?`<span class="arc-stat" style="border-color:#ffd700;color:#ffd700;background:rgba(255,215,0,0.06)">🏆 ${winner.conductor}</span>`:'',
    ].filter(Boolean).join('');
    const slotsHtml=day.slots.map(sl=>{
      const rowCls='arc-slot-row'+(sl.special?' arc-special':sl.blocked?' arc-blocked':!sl.conductor?' arc-empty':'');
      const badge=sl.special?`<span class="arc-badge arc-b-special">${t('arcBadgeSpecial')}</span>`
        :sl.blocked?`<span class="arc-badge arc-b-blocked">${t('arcBadgeBlocked')}</span>`
        :sl.conductor?`<span class="arc-badge arc-b-done">${t('arcBadgeDone')}</span>`
        :`<span class="arc-badge arc-b-empty">${t('arcBadgeEmpty')}</span>`;
      const cond=sl.conductor?`<div class="arc-conductor">${sl.special?'🏆 ':'👤 '}${sl.conductor}</div>`
        :`<div class="arc-conductor none">${sl.blocked?'— blocked —':t('noConductorR4')}</div>`;
      return`<div class="${rowCls}"><div class="arc-time">${sl.ksaLabel}</div>${cond}${badge}</div>`;
    }).join('');
    list.insertAdjacentHTML('beforeend',`
      <div class="arc-day" id="arcday-${di}" style="animation-delay:${di*0.04}s">
        <div class="arc-day-header" onclick="toggleArcDay(${di})">
          <div style="display:flex;align-items:center;gap:12px">
            <div class="arc-date-badge">${dateStr}</div>
            <div class="arc-day-meta">${arcTime?'archived '+arcTime:''}</div>
          </div>
          <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
            <div class="arc-day-stats">${statsHtml}</div><span class="arc-chevron">▼</span>
          </div>
        </div>
        <div class="arc-day-body">${slotsHtml}</div>
      </div>`);
  });
}
function toggleArcDay(idx){document.getElementById('arcday-'+idx).classList.toggle('open');}
function exportCSV(){
  const arc=loadArchive();
  if(!arc.length){toast('No archive data',true);return;}
  let csv='Date,Slot (KSA),Conductor,Status\n';
  arc.forEach(day=>day.slots.forEach(sl=>{
    const status=sl.special?'Competition Winner':sl.blocked?'Blocked':sl.conductor?'Conducted':'No Show';
    csv+=`${day.date},${sl.ksaLabel},"${sl.conductor||'—'}",${status}\n`;
  }));
  const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob([csv],{type:'text/csv'})),download:'obx-train-archive.csv'});
  a.click();
}
async function clearArchive(){
  if(!confirm(t('arcClearConfirm')))return;
  await clearArchiveData(); toast(t('toastCleared')); renderArchive();
}

    el=document.createElement('div');
    el.id='connectingOverlay';
    el.style.cssText='position:fixed;inset:0;background:rgba(4,10,20,0.88);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;';
    el.innerHTML='<div style="font-family:Rajdhani,sans-serif;font-size:28px;font-weight:700;color:#f0a500;letter-spacing:4px;">OBX</div><div style="font-size:13px;color:#4a6a8a;font-weight:700;letter-spacing:2px;">CONNECTING…</div>';
    document.body.appendChild(el);
  }
  el.style.display=on?'flex':'none';
}

  const bar=document.createElement('div');
  bar.style.cssText='background:#1a0a00;border-bottom:2px solid #f0a500;padding:10px 20px;font-size:12px;color:#f0a500;font-weight:700;text-align:center;letter-spacing:1px;cursor:pointer;';
  bar.innerHTML='⚠ Running in offline mode (localStorage only). <u>Click here</u> to learn how to add Firebase for shared real-time data.';
  bar.onclick=()=>alert('To enable real-time shared data:\n\n1. Go to console.firebase.google.com\n2. Create a project → Add a web app\n3. Enable Realtime Database (start in test mode)\n4. Copy your firebaseConfig object\n5. Paste it into the FIREBASE_CONFIG variable at the top of this file\n6. Re-upload to your host\n\nSee the setup guide for full instructions.');

// ── TOAST ─────────────────────────────────────────────────────
function toast(msg,err){
  const el=document.getElementById('toast');
  el.innerHTML=msg; el.style.background=err?'#e03030':'#f0a500'; el.style.color=err?'#fff':'#08111c';
  el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2800);
}

// ── INIT ──────────────────────────────────────────────────────
window.addEventListener('load', ()=>{
  const savedTZ=localStorage.getItem('obx_tz');
  const savedLang=localStorage.getItem('obx_lang');
  const savedName=localStorage.getItem('obx_myname');
  if(savedTZ){tzOffset=parseFloat(savedTZ);document.getElementById('tzPicker').value=savedTZ;}
  if(savedLang){
    lang=savedLang;
    document.body.classList.toggle('rtl',lang==='ar');
    document.documentElement.lang=lang;
    document.querySelectorAll('.pill-btn').forEach(b=>b.classList.toggle('active',b.textContent.toLowerCase()===lang));
  }
  if(savedName)document.getElementById('memberName').value=savedName;
  applyTranslations(); buildDayNavs();
  initData();
  renderMember();
  maybeShowSetupNotice();
});
setInterval(()=>{renderMember();if(isR4)renderR4Today();},60000);
